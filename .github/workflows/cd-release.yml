name: CD Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cd-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test-package:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DWEBAGENT_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp build/webagent dist/webagent
          tar -czf "dist/webagent-${{ runner.os }}-${{ github.ref_name }}.tar.gz" -C dist webagent
          rm -f dist/webagent

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item build/Release/webagent.exe dist/webagent.exe
          Compress-Archive -Path dist/webagent.exe -DestinationPath "dist/webagent-${{ runner.os }}-${{ github.ref_name }}.zip" -Force
          Remove-Item dist/webagent.exe -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: webagent-${{ runner.os }}-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
